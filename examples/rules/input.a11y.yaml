# Accessibility guidance for Components/Input.
# See button.a11y.yaml for the file format. Schema is identical.

# ─── DS rules (defined in input.ts) ────────────────────────────────

ds-input-no-placeholder-label:
  figma_ref: "Input → Accessibility → Labelling"
  fix_guidance: |
    A visible `<label>` element associated with the input via the
    `for` attribute is the standard, preferred pattern:

        <label for="email">Email address</label>
        <input id="email" type="email" placeholder="you@example.com">

    Placeholder text disappears the moment the user starts typing. If
    it's the only label, anyone who lost their place, has cognitive
    load, or uses a screen reader has no way to know what the field
    is for once they've started typing.

    `aria-label` is acceptable only when there is no visible label by
    design (rare, and usually a design-review smell).

ds-input-error-announcement:
  figma_ref: "Input → States → Error"
  fix_guidance: |
    Inline validation messages must announce themselves to screen
    readers as soon as they appear. The simplest pattern:

        <input aria-describedby="email-err" aria-invalid="true">
        <p id="email-err" role="alert">Enter a valid email address.</p>

    `role="alert"` is equivalent to `aria-live="assertive"` plus
    `aria-atomic="true"` — pick one and apply it consistently across
    the codebase. The DS standard is `role="alert"`.

ds-input-required-pattern:
  figma_ref: "Input → Accessibility → Required"
  fix_guidance: |
    Use both the native `required` attribute and `aria-required="true"`:

        <input required aria-required="true">

    Some screen readers do not consistently announce the native
    `required` state on its own, so the redundant `aria-required`
    ensures the "required" announcement always reaches the user.

# ─── Standard axe / WCAG rules with Input-specific guidance ────────

label:
  figma_ref: "Input → Accessibility → Labels"
  fix_guidance: |
    Every input needs a programmatically-associated label.
      - Default: `<label for="...">` paired with `id` on the input.
      - Sibling label not in a <label> tag: use `aria-labelledby`.
      - No visible label by design: `aria-label`.

color-contrast:
  figma_ref: "Input → Accessibility → Contrast"
  fix_guidance: |
    Input text, placeholder text, and border colours all need to meet
    WCAG AA contrast (4.5:1 for text, 3:1 for non-text UI components).
    Use the `input-text`, `input-placeholder`, and `input-border` tokens.
    Placeholder contrast in particular is often missed — many design
    systems' placeholder grey is below threshold.

"2.4.11":
  figma_ref: "Input → States → Focus"
  fix_guidance: |
    Apply the `ds-focus-ring` token to `:focus-visible`. The focus
    indicator must be distinct from the default border state — a
    thicker border alone is not enough if the colour is similar.
